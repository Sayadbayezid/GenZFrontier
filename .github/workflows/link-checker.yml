name: Broken Link Checker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1" # Runs every Monday at midnight
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write
  issues: write

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Links from Sitemap
        uses: lycheeverse/lychee-action@v2
        with:
          # We check the live sitemap to ensure the deployed site is healthy
          args: --verbose --no-progress --accept 200,403,429 https://www.genzfrontir.com/sitemap.xml
          fail: true # This makes the badge turn red if a link is broken
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue if Links are Broken
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken Links Detected in Sitemap"
          content-filepath: ./lychee/out.md
          labels: broken-links, bug
