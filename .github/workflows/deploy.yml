name: Deploy GenZ Frontier News

on:
  push:
    branches:
      - main 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install markdown python-frontmatter

      - name: Run Build Script (Markdown to HTML)
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # The sitemap.xml is now generated in the public directory by build.py
          # and should be deployed along with other static assets.
          # No need for a separate sitemap workflow or commit step.
          cname: www.genzfrontir.com