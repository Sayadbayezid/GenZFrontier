name: Deploy GenZ Frontier News

on:
  push:
    branches:
      - main  # Apnar repository-r branch nam 'master' hole ekhane master likhben

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install markdown

      - name: Run Build Script (Markdown to HTML)
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # Python script ja public foldare output dibe, eta sheta live korbe