name: Deploy GenZ Frontier News

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install markdown python-frontmatter

      - name: Run Build Script (Markdown to HTML)
        run: python build.py

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force sync with remote to avoid non-fast-forward errors
          git fetch origin main
          git reset --hard origin/main
          
          # Add sitemap.xml after build script regeneration
          git add sitemap.xml
          
          # Commit only if there are actual changes
          if [ -n "$(git status --porcelain sitemap.xml)" ]; then
            git commit -m "chore: automated sitemap update [skip ci]"
            git push origin main
          else
            echo "No changes to sitemap.xml"
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: www.genzfrontir.com