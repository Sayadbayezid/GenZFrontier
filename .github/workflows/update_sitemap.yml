name: Auto-Update Root Sitemap

on:
  push:
    branches:
      - main
    # CRITICAL: Prevents the bot from triggering an infinite loop when it pushes the sitemap
    paths-ignore:
      - 'sitemap.xml'
  # Allows you to trigger this manually from the Actions tab
  workflow_dispatch: 

# Grants the bot permission to push code back to your repository
permissions:
  contents: write

jobs:
  update-root-sitemap:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout with full history to preserve your SEO original commit dates
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install required dependencies for your script
      - name: Install Dependencies
        run: pip install markdown python-frontmatter

      # 4. Run the master build script (This triggers your generate_sitemap logic)
      - name: Run Build Script
        run: python build.py

      # 5. Extract the root sitemap and commit it safely
      - name: Commit and Push Sitemap to Root
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          # Commits only if the sitemap has actually changed, using [skip ci] to prevent re-triggering
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update root sitemap [skip ci]" && git push)