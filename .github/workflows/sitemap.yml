name: Auto Sitemap Generator

on:
  push:
    branches:
      - main
    paths:
      - 'public/**/*.html'

  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Sitemap
        run: |
          python << 'EOF'
          import os
          import subprocess
          import xml.etree.ElementTree as ET
          from xml.dom import minidom
          from datetime import datetime

          BASE_URL = "https://www.genzfrontir.com"
          SITEMAP_FILE = "sitemap.xml"
          NAMESPACE = "http://www.sitemaps.org/schemas/sitemap/0.9"

          ET.register_namespace("", NAMESPACE)

          urlset = ET.Element(f"{{{NAMESPACE}}}urlset")

          seen = set()

          def lastmod(path):
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cs", "--", path],
                      stderr=subprocess.DEVNULL
                  ).decode().strip()
              except:
                  return datetime.utcnow().date().isoformat()

          def add(url, lm):
              url = url.rstrip("/") + "/"
              if url in seen:
                  return
              seen.add(url)

              node = ET.SubElement(urlset, f"{{{NAMESPACE}}}url")
              ET.SubElement(node, f"{{{NAMESPACE}}}loc").text = url
              ET.SubElement(node, f"{{{NAMESPACE}}}lastmod").text = lm
              ET.SubElement(node, f"{{{NAMESPACE}}}changefreq").text = "weekly"
              ET.SubElement(node, f"{{{NAMESPACE}}}priority").text = "0.8"

          # SCAN PUBLIC ONLY
          for root, dirs, files in os.walk("public"):

              dirs[:] = [d for d in dirs if not d.startswith(".")]

              for file in files:

                  if not file.endswith(".html"):
                      continue

                  full = os.path.join(root, file)

                  rel = os.path.relpath(full, "public").replace("\\", "/")

                  # skip 404
                  if rel == "404.html":
                      continue

                  # convert index.html → folder/
                  if rel == "index.html":
                      url_path = "/"
                  elif rel.endswith("/index.html"):
                      url_path = "/" + rel[:-11] + "/"
                  else:
                      url_path = "/" + rel[:-5] + "/"

                  # REMOVE DUPLICATE PUBLIC ISSUE (IMPORTANT)
                  url_path = url_path.replace("/public/", "/")

                  final_url = BASE_URL + url_path

                  add(final_url, lastmod(full))

          # SORT
          urls = sorted(seen)

          urlset.clear()

          for u in urls:
              node = ET.SubElement(urlset, f"{{{NAMESPACE}}}url")
              ET.SubElement(node, f"{{{NAMESPACE}}}loc").text = u
              ET.SubElement(node, f"{{{NAMESPACE}}}lastmod").text = datetime.utcnow().date().isoformat()
              ET.SubElement(node, f"{{{NAMESPACE}}}changefreq").text = "weekly"
              ET.SubElement(node, f"{{{NAMESPACE}}}priority").text = "0.8"

          xml = ET.tostring(urlset, encoding="utf-8")

          pretty = minidom.parseString(xml).toprettyxml(
              indent="  ",
              encoding="utf-8"
          )

          pretty = b"\n".join([l for l in pretty.splitlines() if l.strip()])

          with open("sitemap.xml", "wb") as f:
              f.write(pretty)

          print("Sitemap generated from public folder (clean URLs)")
          EOF

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add sitemap.xml
          git commit -m "fix sitemap" || exit 0
          git push