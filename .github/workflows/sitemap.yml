name: Automated Sitemap Generator

on:
  push:
    branches:
      - main
    # Prevent infinite workflow loops when the sitemap itself is updated
    paths-ignore:
      - 'sitemap.xml'
  # Enables manual triggering from the GitHub Actions UI
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # CRITICAL FOR SEO: Fetches all history so the python script 
          # can accurately extract the original commit dates for your files.
          fetch-depth: 0

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Run the sitemap generator script directly 
      # (Dependencies and build.py removed as HTML is already in the root)
      - name: Generate Sitemap
        run: python sitemap_generator.py

      # 4. Commit and push ONLY the root sitemap file
      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          # Commit only if the root sitemap has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated sitemap update [skip ci]" && git push)