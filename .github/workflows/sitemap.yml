name: Auto Sitemap Generator

on:
  push:
    branches:
      - main
    paths:
      - 'news/**/*.md'

  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sitemap-update
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Sitemap
        run: |
          python << 'EOF'
          import os
          import subprocess
          import xml.etree.ElementTree as ET
          from xml.dom import minidom
          from datetime import datetime

          BASE_URL = "https://www.genzfrontir.com"
          SITEMAP_FILE = "sitemap.xml"
          NAMESPACE = "http://www.sitemaps.org/schemas/sitemap/0.9"

          ET.register_namespace("", NAMESPACE)

          urlset = ET.Element(f"{{{NAMESPACE}}}urlset")

          seen = set()

          def get_lastmod(path):
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cs", "--", path],
                      stderr=subprocess.DEVNULL
                  ).decode().strip()
              except:
                  return datetime.utcnow().date().isoformat()

          def add_url(url, lastmod, priority="0.8", changefreq="weekly"):
              url = url.rstrip("/") + "/"

              if url in seen:
                  return

              seen.add(url)

              node = ET.SubElement(urlset, f"{{{NAMESPACE}}}url")

              ET.SubElement(node, f"{{{NAMESPACE}}}loc").text = url
              ET.SubElement(node, f"{{{NAMESPACE}}}lastmod").text = lastmod
              ET.SubElement(node, f"{{{NAMESPACE}}}changefreq").text = changefreq
              ET.SubElement(node, f"{{{NAMESPACE}}}priority").text = priority

          # HOME PAGE
          add_url(
              f"{BASE_URL}/",
              datetime.utcnow().date().isoformat(),
              "1.0",
              "daily"
          )

          # SCAN NEWS MD FILES
          for root, dirs, files in os.walk("news"):

              dirs[:] = [d for d in dirs if not d.startswith(".")]

              for file in files:

                  if not file.endswith(".md"):
                      continue

                  full_path = os.path.join(root, file)

                  rel = os.path.relpath(full_path, "news").replace("\\", "/")

                  # remove .md
                  slug = rel[:-3]

                  # SPLIT CATEGORY + FILE
                  parts = slug.split("/", 1)

                  if len(parts) == 2:
                      category, post = parts
                      url = f"{BASE_URL}/{category}/{post}/"
                  else:
                      url = f"{BASE_URL}/{slug}/"

                  add_url(
                      url,
                      get_lastmod(full_path)
                  )

          # SORT + BUILD XML
          sorted_urls = sorted(list(seen))

          urlset.clear()

          for u in sorted_urls:

              node = ET.SubElement(urlset, f"{{{NAMESPACE}}}url")

              ET.SubElement(node, f"{{{NAMESPACE}}}loc").text = u
              ET.SubElement(node, f"{{{NAMESPACE}}}lastmod").text = datetime.utcnow().date().isoformat()
              ET.SubElement(node, f"{{{NAMESPACE}}}changefreq").text = "weekly"
              ET.SubElement(node, f"{{{NAMESPACE}}}priority").text = "0.8"

          xml = ET.tostring(urlset, encoding="utf-8")

          pretty = minidom.parseString(xml).toprettyxml(
              indent="  ",
              encoding="utf-8"
          )

          pretty = b"\n".join([l for l in pretty.splitlines() if l.strip()])

          old = b""
          if os.path.exists(SITEMAP_FILE):
              with open(SITEMAP_FILE, "rb") as f:
                  old = f.read()

          if old == pretty:
              print("No changes in sitemap")
              exit(0)

          with open(SITEMAP_FILE, "wb") as f:
              f.write(pretty)

          print(f"Generated {len(seen)} URLs")
          EOF

      - name: Commit Sitemap
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"

          git add sitemap.xml

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: category-based sitemap (no /news prefix)"
          git pull --rebase origin main
          git push origin main